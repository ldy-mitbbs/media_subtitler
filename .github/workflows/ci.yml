name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Run integration tests on a schedule (weekly) to catch API changes.
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,webapp]"

      - name: Run unit tests
        run: pytest -v -m "not integration"

  integration-ollama:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OLLAMA_TEST_MODEL: qwen2.5:0.5b
      FASTER_WHISPER_TEST_MODEL: tiny
      FASTER_WHISPER_TEST_DEVICE: cpu
      FASTER_WHISPER_TEST_COMPUTE_TYPE: int8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y curl ffmpeg tar xz-utils

      - name: Install ARIB-capable FFmpeg
        run: |
          sudo mkdir -p /opt/ffmpeg
          curl -fsSL \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz \
            | sudo tar -xJ --strip-components=1 -C /opt/ffmpeg
          echo "/opt/ffmpeg/bin" >> "$GITHUB_PATH"
          /opt/ffmpeg/bin/ffmpeg -hide_banner -decoders | grep -E "libaribcaption|libaribb24|arib_caption"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,webapp]"

      - name: Cache faster-whisper models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: faster-whisper-${{ runner.os }}-${{ env.FASTER_WHISPER_TEST_MODEL }}

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ runner.os }}-${{ env.OLLAMA_TEST_MODEL }}

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/ollama.log
          exit 1

      - name: Pull test model
        run: ollama pull "$OLLAMA_TEST_MODEL"

      - name: Run Ollama integration tests
        run: pytest -v --run-integration --run-slow -m "ollama"

  integration-openrouter:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[run-integration]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,webapp]"

      - name: Run OpenRouter integration tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: pytest -v --run-integration -m "openrouter or deepseek"
        timeout-minutes: 10
